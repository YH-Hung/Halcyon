services:
  db2:
    image: icr.io/db2_community/db2:11.5.9.0
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: halcyon
      DBNAME: SAMPLE
      PERSISTENT_HOME: "false"
    ports:
      - "50000:50000"
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to SAMPLE' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30
