name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Formatting + static analysis. clang-format is authoritative for style;
  # clang-tidy runs against the real compile_commands.json so it sees the seam.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-format-18 clang-tidy-18 cmake ninja-build
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
            /usr/bin/clang-format-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-18 100

      - name: clang-format (check only)
        id: clang_format
        continue-on-error: true
        run: |
          mapfile -t files < <(find include src tests examples \
            \( -name '*.hpp' -o -name '*.cpp' \) -type f)
          printf '%s\n' "${files[@]}"
          clang-format --dry-run --Werror "${files[@]}"

      # clang-tidy needs the headers + libdb2 present so the seam translation
      # unit compiles.
      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure (for compile_commands.json)
        run: cmake -S . -B build -G Ninja -DHALCYON_BUILD_TESTS=ON

      - name: clang-tidy
        run: |
          python3 -c 'import json, pathlib; root = pathlib.Path.cwd(); commands = json.loads(pathlib.Path("build/compile_commands.json").read_text()); [print(path) for path in (pathlib.Path(e["file"]).resolve() for e in commands) if root in path.parents and path.suffix == ".cpp" and "src" in path.parts]' |
            xargs clang-tidy -p build

      - name: Fail if clang-format failed
        if: steps.clang_format.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Build + unit tests across compilers. No live DB: the unit + smoke tests
  # mock the seam, and integration tests report Skipped without HALCYON_TEST_DSN.
  # ---------------------------------------------------------------------------
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: gcc,   cc: gcc-13,   cxx: g++-13 }
          - { name: clang, cc: clang-18, cxx: clang++-18 }
    name: build-test (${{ matrix.compiler.name }})
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ${{ matrix.compiler.cc }}

      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DHALCYON_BUILD_TESTS=ON \
            -DHALCYON_BUILD_EXAMPLES=ON \
            -DHALCYON_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      # Excludes the integration label; those need a live Db2 (see integration job).
      - name: Test (unit + smoke)
        run: ctest --test-dir build -LE integration --output-on-failure

  # ---------------------------------------------------------------------------
  # Consumption via FetchContent/add_subdirectory. No live DB.
  # ---------------------------------------------------------------------------
  fetchcontent:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++-13

      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -S . -B build -G Ninja -DHALCYON_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: FetchContent + install smoke tests
        run: ctest --test-dir build -R smoke --output-on-failure

  # ---------------------------------------------------------------------------
  # macOS build + unit tests. Intel runner (macos-13) so the x86_64 IBM driver
  # links and loads. No live DB.
  # ---------------------------------------------------------------------------
  build-test-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: brew install cmake ninja

      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DHALCYON_BUILD_TESTS=ON \
            -DHALCYON_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test (unit + smoke)
        run: ctest --test-dir build -LE integration --output-on-failure

  # ---------------------------------------------------------------------------
  # Concurrency correctness under ThreadSanitizer. Mocks the seam, no live DB.
  # ---------------------------------------------------------------------------
  stress-tsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-18

      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure (TSan)
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -S . -B build -G Ninja \
            -DHALCYON_BUILD_TESTS=ON \
            -DHALCYON_BUILD_STRESS_TESTS=ON \
            -DHALCYON_SANITIZER=thread

      - name: Build
        run: cmake --build build -j

      - name: Stress (correctness)
        run: ctest --test-dir build -L stress --output-on-failure

  # ---------------------------------------------------------------------------
  # Integration tests against a live Db2. The community image needs a privileged
  # container, which GitHub `services:` cannot provide, so we drive the repo's
  # compose file directly and wait for the SAMPLE database to come up healthy.
  # ---------------------------------------------------------------------------
  integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++-13

      - name: Set up Db2 CLI driver
        uses: ./.github/actions/setup-db2-clidriver

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -S . -B build -G Ninja \
            -DHALCYON_BUILD_TESTS=ON \
            -DHALCYON_BUILD_INTEGRATION_TESTS=ON

      - name: Build
        run: cmake --build build -j

      # First boot creates SAMPLE (~2 min). --wait blocks until healthy.
      # The Db2 image can still restart once after that while finishing setup,
      # so wait for the entrypoint completion marker plus stable host probes.
      - name: Start Db2
        run: |
          docker compose -f docker/docker-compose.yml up -d --wait --wait-timeout 600
          docker/wait-for-db2-ready.sh docker/docker-compose.yml db2 \
            env HALCYON_TEST_DSN="DATABASE=SAMPLE;HOSTNAME=localhost;PORT=50000;UID=db2inst1;PWD=halcyon;" \
            build/tests/integration/halcyon_integration_tests \
              --gtest_filter=Db2FacadeIntegration.QueryExecuteAndTransaction

      - name: Integration tests
        env:
          HALCYON_TEST_DSN: DATABASE=SAMPLE;HOSTNAME=localhost;PORT=50000;UID=db2inst1;PWD=halcyon;
        run: ctest --test-dir build -L integration --output-on-failure

      # Downstream consumer sample: install Halcyon, build the sample against the
      # install prefix via find_package(Halcyon), then run both walkthroughs
      # against the live Db2 (mirrors samples/orders/README.md). Catches
      # consumer-facing API/packaging drift that the in-tree tests cannot.
      - name: Orders sample (install + build + run)
        env:
          HALCYON_TEST_DSN: DATABASE=SAMPLE;HOSTNAME=localhost;PORT=50000;UID=db2inst1;PWD=halcyon;
        run: |
          cmake --install build --prefix "$PWD/.halcyon-prefix"
          (cd samples/orders && ./load_sql.sh)
          cmake -S samples/orders -B samples/orders/build -G Ninja \
            -DCMAKE_PREFIX_PATH="$PWD/.halcyon-prefix" \
            -DDB2_CLIDRIVER_ROOT="$PWD/third_party/clidriver"
          cmake --build samples/orders/build -j
          ./samples/orders/build/orders_oo
          ./samples/orders/build/orders_functional

      - name: Db2 logs (on failure)
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --no-color

      - name: Tear down Db2
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
